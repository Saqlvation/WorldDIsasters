<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>world disasters map</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <!-- necesarry to make the map work -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
    
    <style>

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
        #mapGrid {
            height: 800px;
            width: 80%;
        }
        #mainTexts {
            text-align: center;
        }
        #container {
            display: flex;
        }
        #sidebar {
            width: 20%;
            height: 800px;
            overflow-y: scroll; /* controls what happens when the content is taller than its container making it scrollable instead of making the whole page scrollable*/
            background-color: #111111;
        }
        .item {
            padding: 10px;
            cursor: pointer;
            /* start of rules to make the img appear in the same line as the text */
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .item:hover{
            background-color: #706a6a; /* when u hover over it it changes the background */
        }

        .img {
            width: 32px;
            height: 32px;
        }
    </style>
</head>


<body>
    <div id="mainTexts">
    <h1>Current World Events:</h1>
    <h1 id="numberDisasters">loading . . . </h1> <!-- since it takes a few seconds to load the API i change the text to loading -->
    </div>
<div id="container">
    <div id="mapGrid"></div>
    <div id="sidebar"></div>

</div>




<!-- necesarry to make the map work -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="script.js"></script> 

</body>























</html>
